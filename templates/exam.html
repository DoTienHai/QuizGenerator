{% extends "base.html" %}

{% block title %}Làm Bài Kiểm Tra - QuizGenerator{% endblock %}

{% block content %}
<div id="quizSelectSection" style="max-width: 600px; margin: 30px auto;">
    <h2>📋 Chọn Bộ Câu Hỏi</h2>
    <div id="quizList" class="grid" style="margin-top: 20px;"></div>
    <div id="loadingSpinner" style="text-align: center; padding: 40px;">
        <p style="color: #667eea;">Đang tải danh sách Quiz...</p>
    </div>
</div>

<div id="configSection" style="max-width: 600px; margin: 30px auto; display: none;">
    <h2>⚙️ Cấu Hình Bài Kiểm Tra</h2>
    <div id="selectedQuizInfo" style="background: #f0f4ff; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        <p><strong>📚 Quiz Được Chọn:</strong> <span id="quizNameDisplay"></span></p>
        <p><strong>📊 Tổng Câu Hỏi:</strong> <span id="totalQuestionsDisplay"></span> câu</p>
        <button type="button" class="btn btn-secondary" style="margin-top: 10px;" onclick="changeQuiz()">🔄 Chọn Quiz Khác</button>
    </div>

    <form id="configForm" style="margin-top: 30px;">
        <div class="form-group">
            <label for="numQuestions">📊 Số Câu Hỏi (1-50):</label>
            <input type="number" id="numQuestions" name="numQuestions" min="1" max="50" value="10" required>
        </div>

        <div class="form-group">
            <label for="duration">⏱️ Thời Gian (phút):</label>
            <input type="number" id="duration" name="duration" min="1" max="180" value="30" required>
        </div>

        <button type="submit" class="btn btn-success" style="width: 100%; padding: 15px; font-size: 16px;">
            🎮 Bắt Đầu Làm Bài
        </button>
    </form>
</div>

<div id="examSection" style="display: none;">
    <div class="timer" id="timer">30:00</div>

    <div id="questionContainer"></div>

    <div style="margin-top: 30px; text-align: center;">
        <button type="button" class="btn btn-success" onclick="submitExam()">
            ✅ Nộp Bài
        </button>
        <button type="button" class="btn btn-secondary" onclick="resetExam()">
            🔄 Làm Lại
        </button>
    </div>
</div>

<script>
    let sessionId = null;
    let remainingTime = 0;
    let timerInterval = null;
    let answers = {};
    let selectedQuizData = null;

    // Load quiz list on page load
    document.addEventListener('DOMContentLoaded', () => {
        const savedQuizId = sessionStorage.getItem('selectedQuizId');
        if (savedQuizId) {
            // User came from quiz list page
            loadConfigSection();
        } else {
            // User came directly to exam page - show quiz selection
            loadQuizzes();
        }
    });

    async function loadQuizzes() {
        try {
            const quizSelectSection = document.getElementById('quizSelectSection');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const quizListContainer = document.getElementById('quizList');

            const response = await fetch('/api/quizzes');
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Lỗi tải danh sách Quiz');
            }

            const quizzes = data.quizzes || [];

            if (quizzes.length === 0) {
                quizListContainer.innerHTML = '<p style="text-align: center; color: #999;">📭 Chưa có Quiz nào. Vui lòng tải Quiz trước!</p>';
                loadingSpinner.style.display = 'none';
                return;
            }

            loadingSpinner.style.display = 'none';
            quizListContainer.innerHTML = '';

            quizzes.forEach(quiz => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.cursor = 'pointer';
                card.style.transition = 'all 0.3s';
                card.innerHTML = `
                    <h3>${quiz.name || `Quiz #${quiz.id}`}</h3>
                    <p style="color: #666;">📚 <strong>${quiz.total_questions || 0}</strong> câu hỏi</p>
                    <button type="button" class="btn btn-success" onclick="selectQuiz(${quiz.id}, '${quiz.name}', ${quiz.total_questions})">
                        ✅ Chọn Bộ Này
                    </button>
                `;
                quizListContainer.appendChild(card);
            });

        } catch (error) {
            showMessage(`❌ ${error.message}`, 'error');
        }
    }

    function selectQuiz(quizId, quizName, totalQuestions) {
        // Save to session storage
        sessionStorage.setItem('selectedQuizId', quizId);
        sessionStorage.setItem('selectedQuizName', quizName);
        sessionStorage.setItem('selectedQuizTotal', totalQuestions);

        selectedQuizData = {
            id: quizId,
            name: quizName,
            total_questions: totalQuestions
        };

        // Update max num_questions
        document.getElementById('numQuestions').max = totalQuestions;

        loadConfigSection();
    }

    function loadConfigSection() {
        const quizSelectSection = document.getElementById('quizSelectSection');
        const configSection = document.getElementById('configSection');
        
        const quizName = sessionStorage.getItem('selectedQuizName') || 'Unknown';
        const totalQuestions = sessionStorage.getItem('selectedQuizTotal') || '0';

        document.getElementById('quizNameDisplay').textContent = quizName;
        document.getElementById('totalQuestionsDisplay').textContent = totalQuestions;
        document.getElementById('numQuestions').max = parseInt(totalQuestions);

        quizSelectSection.style.display = 'none';
        configSection.style.display = 'block';

        showMessage(`✅ Đã chọn: ${quizName}`, 'success');
    }

    function changeQuiz() {
        // Clear selection
        sessionStorage.removeItem('selectedQuizId');
        sessionStorage.removeItem('selectedQuizName');
        sessionStorage.removeItem('selectedQuizTotal');
        selectedQuizData = null;

        // Show quiz selection again
        document.getElementById('configSection').style.display = 'none';
        document.getElementById('quizSelectSection').style.display = 'block';
    }

    document.getElementById('configForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();

        const quizId = parseInt(sessionStorage.getItem('selectedQuizId'));
        const numQuestions = parseInt(document.getElementById('numQuestions').value);
        const duration = parseInt(document.getElementById('duration').value);
        const totalQuestions = parseInt(sessionStorage.getItem('selectedQuizTotal'));

        // Validate
        if (numQuestions > totalQuestions) {
            showMessage(`❌ Số câu vượt quá tổng câu hỏi (${totalQuestions})`, 'error');
            return;
        }

        try {
            showMessage('Đang tạo session...', 'info');

            const response = await fetch('/api/sessions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    quiz_id: quizId,
                    num_questions: numQuestions,
                    exam_duration: duration
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Lỗi tạo session');
            }

            sessionId = data.session_id;
            remainingTime = duration * 60;

            // Load questions
            loadQuestions(sessionId);

            // Hide config, show exam
            document.getElementById('configSection').style.display = 'none';
            document.getElementById('examSection').style.display = 'block';

            // Start timer
            startTimer();

            showMessage('✅ Session tạo thành công!', 'success');

        } catch (error) {
            showMessage(`❌ ${error.message}`, 'error');
        }
    });

    async function loadQuestions(sessionId) {
        try {
            const response = await fetch(`/api/sessions/${sessionId}`);
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Lỗi tải câu hỏi');
            }

            const questions = data.questions || [];
            const container = document.getElementById('questionContainer');
            container.innerHTML = '';

            questions.forEach((question, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-card';
                questionDiv.innerHTML = `
                    <div class="question-text">
                        <span style="color: #667eea; font-weight: bold;">Câu ${index + 1}:</span>
                        ${question.text || 'Câu hỏi không có nội dung'}
                    </div>
                    <div class="options">
                        ${['A', 'B', 'C', 'D'].map(option => `
                            <label class="option">
                                <input type="radio" name="question_${question.id}" value="${option}" onchange="recordAnswer(${question.id}, '${option}')">
                                <span class="option-label">${option}. ${question[`option_${option.toLowerCase()}`] || 'N/A'}</span>
                            </label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(questionDiv);
            });

        } catch (error) {
            showMessage(`❌ ${error.message}`, 'error');
        }
    }

    function recordAnswer(questionId, answer) {
        answers[questionId] = answer;
        console.log('Answer recorded:', questionId, answer);
    }

    function startTimer() {
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            remainingTime--;

            if (remainingTime <= 0) {
                clearInterval(timerInterval);
                auto_submitExam();
                return;
            }

            updateTimerDisplay();

            // Warning at 5 minutes
            if (remainingTime === 300) {
                showMessage('⚠️ Còn 5 phút!', 'info');
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const minutes = Math.floor(remainingTime / 60);
        const seconds = remainingTime % 60;
        const timerElement = document.getElementById('timer');
        timerElement.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

        // Change color based on time remaining
        if (remainingTime <= 60) {
            timerElement.classList.add('danger');
            timerElement.classList.remove('warning');
        } else if (remainingTime <= 300) {
            timerElement.classList.add('warning');
            timerElement.classList.remove('danger');
        } else {
            timerElement.classList.remove('danger', 'warning');
        }
    }

    async function submitExam() {
        if (!sessionId) {
            showMessage('❌ Session không hợp lệ', 'error');
            return;
        }

        if (Object.keys(answers).length === 0) {
            showMessage('⚠️ Bạn chưa trả lời câu nào', 'info');
            return;
        }

        try {
            clearInterval(timerInterval);
            showMessage('Đang nộp bài...', 'info');

            // Submit answers
            const submitResponse = await fetch(`/api/sessions/${sessionId}/submit`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ answers: answers })
            });

            const submitData = await submitResponse.json();

            if (!submitResponse.ok) {
                throw new Error(submitData.error || 'Lỗi nộp bài');
            }

            showMessage('✅ Nộp bài thành công!', 'success');

            // Redirect to results
            sessionStorage.setItem('examSessionId', sessionId);
            setTimeout(() => {
                window.location.href = '/results';
            }, 1500);

        } catch (error) {
            showMessage(`❌ ${error.message}`, 'error');
            startTimer(); // Restart timer if error
        }
    }

    async function auto_submitExam() {
        showMessage('⏰ Hết thời gian! Đang nộp bài tự động...', 'info');
        await submitExam();
    }

    function resetExam() {
        if (confirm('Bạn có chắc muốn làm lại bài từ đầu?')) {
            clearInterval(timerInterval);
            sessionId = null;
            answers = {};
            document.getElementById('configSection').style.display = 'block';
            document.getElementById('examSection').style.display = 'none';
            document.getElementById('configForm').reset();
        }
    }
</script>
{% endblock %}

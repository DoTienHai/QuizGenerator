{% extends "base.html" %}

{% block title %}Kết Quả - QuizGenerator{% endblock %}

{% block content %}
<h2>📊 Kết Quả Bài Kiểm Tra</h2>

<div id="loadingSpinner" style="text-align: center; padding: 60px 20px;">
    <div style="display: inline-block; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="color: #667eea; margin-top: 20px;">Đang tải kết quả...</p>
</div>

<div id="resultsContainer" style="display: none; max-width: 1000px; margin: 30px auto;">
    <!-- Score Header -->
    <div class="card" id="scoreCard" style="text-align: center; padding: 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; margin-bottom: 30px;">
        <h1 id="scorePercent" style="font-size: 3em; margin: 0;">0%</h1>
        <h2 id="scoreStatus" style="color: #28a745; margin: 20px 0;">✅ ĐẬU</h2>
        <p id="scoreDetail" style="font-size: 1.1em;">Bạn trả lời đúng: <strong>0/0</strong> câu</p>
        <p id="submittedAt" style="font-size: 0.95em; opacity: 0.9;">Ngày làm: N/A</p>
    </div>

    <!-- Detailed Answers -->
    <div class="card">
        <h3>📝 Chi Tiết Câu Trả Lời</h3>
        <div id="answersContainer"></div>
    </div>

    <!-- Navigation Buttons -->
    <div style="margin-top: 30px; text-align: center; margin-bottom: 30px;">
        <button class="btn btn-success" onclick="retakeExam()">🔄 Làm Lại</button>
    </div>
</div>

<script src="{{ url_for('static', filename='js/results.js') }}"></script>
{% endblock %}

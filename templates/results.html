{% extends "base.html" %}

{% block title %}Kết Quả - QuizGenerator{% endblock %}

{% block content %}
<h2>📊 Kết Quả Bài Kiểm Tra</h2>

<div id="resultsContainer" style="max-width: 800px; margin: 30px auto;"></div>

<div id="loadingSpinner" style="text-align: center; padding: 60px 20px;">
    <div style="display: inline-block; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="color: #667eea; margin-top: 20px;">Đang tải kết quả...</p>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadResults);

    async function loadResults() {
        try {
            const sessionId = sessionStorage.getItem('examSessionId');
            const quizId = sessionStorage.getItem('selectedQuizId');

            if (!sessionId && !quizId) {
                throw new Error('Không có session hoặc quiz để xem kết quả');
            }

            const endpoint = sessionId ? `/api/results/${sessionId}` : `/api/quizzes/${quizId}/results`;
            
            const response = await fetch(endpoint);
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Lỗi tải kết quả');
            }

            displayResults(data);

        } catch (error) {
            showMessage(`❌ ${error.message}`, 'error');
            document.getElementById('loadingSpinner').style.display = 'none';
        }
    }

    function displayResults(data) {
        const container = document.getElementById('resultsContainer');
        const spinner = document.getElementById('loadingSpinner');

        spinner.style.display = 'none';
        container.style.display = 'block';

        const results = data.results || data;

        // Calculate score percentage
        const correct = results.correct_answers || 0;
        const total = results.total_questions || (results.correct_answers + results.incorrect_answers + results.skipped || 0);
        const percentage = total > 0 ? Math.round((correct / total) * 100) : 0;
        const status = percentage >= 70 ? '✅ ĐẬU' : '❌ KHÔNG ĐẬU';
        const statusColor = percentage >= 70 ? '#28a745' : '#dc3545';

        let html = `
            <div class="card" style="text-align: center; padding: 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none;">
                <h1 style="font-size: 3em; margin: 0;">🎯 ${percentage}%</h1>
                <h2 style="color: ${statusColor}; margin: 20px 0;">${status}</h2>
                <p style="font-size: 1.1em;">Điểm của bạn: <strong>${correct}/${total}</strong></p>
            </div>

            <div class="grid">
                <div class="card">
                    <h3>✅ Câu Đúng</h3>
                    <p style="font-size: 2em; color: #28a745; margin: 10px 0;">${correct}</p>
                </div>
                <div class="card">
                    <h3>❌ Câu Sai</h3>
                    <p style="font-size: 2em; color: #dc3545; margin: 10px 0;">${results.incorrect_answers || 0}</p>
                </div>
                <div class="card">
                    <h3>⏭️ Câu Bỏ Qua</h3>
                    <p style="font-size: 2em; color: #ff9800; margin: 10px 0;">${results.skipped || 0}</p>
                </div>
                <div class="card">
                    <h3>⏱️ Thời Gian Làm</h3>
                    <p style="font-size: 1.5em; color: #667eea; margin: 10px 0;">${results.time_spent || 'N/A'}</p>
                </div>
            </div>

            <div style="margin-top: 30px; text-align: center;">
                <a href="/list-quizzes" class="btn btn-success">📋 Xem Danh Sách Quiz</a>
                <a href="/exam" class="btn btn-secondary">🔄 Làm Bài Khác</a>
            </div>

            <div class="card" style="margin-top: 30px; background: #f0f4ff;">
                <h3>📝 Chi Tiết Kết Quả</h3>
                <table style="width: 100%; border-collapse: collapse;">
                    <tr style="border-bottom: 1px solid #ddd;">
                        <td style="padding: 10px;"><strong>Quiz:</strong></td>
                        <td style="padding: 10px;">${results.quiz_name || 'N/A'}</td>
                    </tr>
                    <tr style="border-bottom: 1px solid #ddd;">
                        <td style="padding: 10px;"><strong>Session ID:</strong></td>
                        <td style="padding: 10px; font-family: monospace;">${results.session_id || 'N/A'}</td>
                    </tr>
                    <tr style="border-bottom: 1px solid #ddd;">
                        <td style="padding: 10px;"><strong>Ngày Làm Bài:</strong></td>
                        <td style="padding: 10px;">${results.submitted_at || 'N/A'}</td>
                    </tr>
                    <tr>
                        <td style="padding: 10px;"><strong>Trạng Thái:</strong></td>
                        <td style="padding: 10px;"><span style="color: ${statusColor}; font-weight: bold;">${status}</span></td>
                    </tr>
                </table>
            </div>
        `;

        container.innerHTML = html;
    }
</script>
{% endblock %}

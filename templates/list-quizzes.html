{% extends "base.html" %}

{% block title %}Danh Sách Quiz - QuizGenerator{% endblock %}

{% block content %}
<h2>📋 Danh Sách Tất Cả Quiz</h2>

<table id="quizTable" class="quiz-table" style="display: none; width: 100%; border-collapse: collapse; margin-top: 20px;">
    <thead>
        <tr style="background-color: #667eea; color: white;">
            <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">#</th>
            <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Tên Quiz</th>
            <th style="padding: 12px; text-align: center; border: 1px solid #ddd;">Số Câu Hỏi</th>
            <th style="padding: 12px; text-align: center; border: 1px solid #ddd;">Ngày Tải</th>
            <th style="padding: 12px; text-align: center; border: 1px solid #ddd;">Hành Động</th>
        </tr>
    </thead>
    <tbody id="quizTableBody"></tbody>
</table>

<div id="noQuizzes" style="text-align: center; padding: 60px 20px;">
    <p style="font-size: 1.2em; color: #999;">📭 Chưa có quiz nào</p>
    <p style="color: #999; margin-bottom: 20px;">Hãy tải quiz mới để bắt đầu!</p>
    <a href="/" class="btn btn-success">📤 Tải Quiz Đầu Tiên</a>
</div>

<style>
.quiz-table tbody tr {
    border-bottom: 1px solid #ddd;
    transition: all 0.3s ease;
}

.quiz-table tbody tr:hover {
    background-color: #f5f5f5;
}

.quiz-table tbody td {
    padding: 12px;
    border: 1px solid #ddd;
}

.action-buttons {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
}

.action-buttons button {
    padding: 6px 12px;
    font-size: 0.9em;
    white-space: nowrap;
}
</style>

<script src="{{ url_for('static', filename='js/list-quizzes.js') }}"></script>
{% endblock %}

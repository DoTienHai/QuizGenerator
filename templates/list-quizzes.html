{% extends "base.html" %}

{% block title %}Danh Sách Quiz - QuizGenerator{% endblock %}

{% block content %}
<h2>📋 Danh Sách Tất Cả Quiz</h2>

<div style="margin: 20px 0;">
    <a href="/upload" class="btn">➕ Tải Quiz Mới</a>
</div>

<div id="quizList" class="grid"></div>

<div id="noQuizzes" style="text-align: center; padding: 60px 20px;">
    <p style="font-size: 1.2em; color: #999;">📭 Chưa có quiz nào</p>
    <p style="color: #999; margin-bottom: 20px;">Hãy tải quiz mới để bắt đầu!</p>
    <a href="/upload" class="btn btn-success">📤 Tải Quiz Đầu Tiên</a>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadQuizzes);

    async function loadQuizzes() {
        try {
            showMessage('Đang tải danh sách quiz...', 'info');
            
            const response = await fetch('/api/quizzes');
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Lỗi tải quiz');
            }

            const quizzes = data.quizzes || [];
            const quizListContainer = document.getElementById('quizList');
            const noQuizzesDiv = document.getElementById('noQuizzes');

            if (quizzes.length === 0) {
                quizListContainer.style.display = 'none';
                noQuizzesDiv.style.display = 'block';
                return;
            }

            quizListContainer.style.display = 'grid';
            noQuizzesDiv.style.display = 'none';

            quizzes.forEach(quiz => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${quiz.name || `Quiz #${quiz.id}`}</h3>
                    <p style="color: #666; margin: 10px 0;">
                        📚 <strong>${quiz.total_questions || 0}</strong> câu hỏi
                    </p>
                    <p style="color: #666; font-size: 0.9em;">
                        📅 ${quiz.uploaded_at || 'N/A'}
                    </p>
                    <div style="margin-top: 15px;">
                        <button class="btn btn-success" onclick="startExam(${quiz.id}, '${quiz.name}')">
                            🎮 Bắt Đầu Làm Bài
                        </button>
                        <button class="btn btn-secondary" onclick="viewResults(${quiz.id})">
                            📊 Xem Kết Quả
                        </button>
                    </div>
                `;
                quizListContainer.appendChild(card);
            });

            showMessage(`✅ Tải ${quizzes.length} quiz thành công!`, 'success');

        } catch (error) {
            showMessage(`❌ ${error.message}`, 'error');
        }
    }

    function startExam(quizId, quizName) {
        // Store quiz info in session storage for exam page
        sessionStorage.setItem('selectedQuizId', quizId);
        sessionStorage.setItem('selectedQuizName', quizName);
        window.location.href = '/exam';
    }

    function viewResults(quizId) {
        sessionStorage.setItem('selectedQuizId', quizId);
        window.location.href = '/results';
    }
</script>
{% endblock %}
